<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>لعبة الأناضول</title>
  <style>
    :root {
      --bg:     #1C1C1E;
      --card:   #2C2C2E;
      --card2:  #3A3A3C;
      --blue:   #0A84FF;
      --red:    #FF453A;
      --green:  #30D158;
      --gray:   #636366;
      --gray2:  #8E8E93;
      --label:  #FFFFFF;
      --label2: rgba(235,235,245,0.6);
      --sep:    rgba(255,255,255,0.08);
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.5);
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: Calibri, 'Trebuchet MS', 'Century Gothic', 'Gill Sans', sans-serif;
      background: var(--bg);
      color: var(--label);
      display: flex; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      width: 100%; max-width: 430px;
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    h1 { font-size: 28px; font-weight: 700; color: var(--label); }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: var(--radius);
      font-size: 17px; font-weight: 700; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      transition: opacity 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn:active { transform: scale(0.97); opacity: 0.82; }
    .btn-primary { background: var(--blue);  color: #fff; height: 58px; width: 100%; font-size: 18px; }
    .btn-green   { background: var(--green); color: #000; height: 58px; width: 100%; }
    .btn-ghost   { background: transparent; color: var(--blue); height: 40px; font-size: 16px; font-weight: 600; }
    .btn:disabled { opacity: 0.3; pointer-events: none; }

    /* ── Icon buttons (navbar) ── */
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
      font-size: 17px; flex-shrink: 0;
    }
    .icon-btn:active { background: rgba(255,255,255,0.25); }
    .icon-btn.end-btn {
      background: var(--red);
      border-color: var(--red);
    }
    .icon-btn.end-btn:active { background: #e0332a; border-color: #e0332a; }

    /* ─────────────────────────────────────
       SCREEN 1 — Setup
    ───────────────────────────────────── */
    #screen-setup {
      padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 28px);
      gap: 22px;
    }
    .setup-header { text-align: center; padding-top: 8px; }
    .setup-header p { color: var(--gray2); margin-top: 6px; font-size: 16px; }

    .player-list { display: flex; flex-direction: column; gap: 12px; }
    .player-row {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex; align-items: center;
      padding: 12px 14px; gap: 12px;
    }
    .avatar-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--card2); border: 2px solid transparent;
      font-size: 24px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .avatar-btn:active { transform: scale(0.88); }
    .name-input {
      flex: 1; border: none; outline: none;
      font-size: 20px; font-family: inherit;
      color: var(--label); background: transparent; text-align: right;
    }
    .name-input::placeholder { color: var(--gray); }
    .remove-btn {
      background: none; border: none; color: var(--gray);
      font-size: 22px; cursor: pointer; padding: 6px; line-height: 1;
      flex-shrink: 0; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .add-player-wrap { text-align: center; }

    /* ─────────────────────────────────────
       SCREEN 2 — Hero Design
    ───────────────────────────────────── */
    #screen-game { height: 100dvh; overflow: hidden; }

    /* Top half — colored hero */
    .hero-section {
      flex: 0 0 50dvh;
      background: #1a3a5c;
      padding: calc(var(--safe-top) + 14px) 18px 18px;
      display: flex; flex-direction: column;
      transition: background-color 0.55s ease;
    }
    .hero-section.critical {
      animation: hero-pulse 0.45s ease-in-out infinite alternate;
    }
    @keyframes hero-pulse {
      from { background-color: #7a1010; }
      to   { background-color: #c01818; }
    }

    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; margin-bottom: 0;
    }
    .nav-group { display: flex; gap: 10px; }

    .hero-content {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
    }
    .hero-avatar {
      font-size: 76px; line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.35));
    }
    .hero-name {
      font-size: 32px; font-weight: 700;
      font-family: Calibri, 'Trebuchet MS', 'Century Gothic', 'Gill Sans', sans-serif;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* Bottom half — dark timer sheet */
    .timer-sheet {
      flex: 0 0 50dvh;
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      padding: 14px 20px calc(var(--safe-bottom) + 20px);
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.14); border-radius: 2px;
      margin: 0 auto 14px;
    }
    .timer-center {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
    }
    #timer-display {
      font-size: 100px; font-weight: 800;
      letter-spacing: -5px; color: var(--label);
      font-variant-numeric: tabular-nums; line-height: 1;
      transition: color 0.25s;
    }
    #timer-display.critical { color: var(--red); }
    .timer-unit { font-size: 15px; color: var(--gray2); font-weight: 500; }

    .expired-banner {
      display: none;
      background: rgba(255,69,58,0.14);
      border: 1.5px solid rgba(255,69,58,0.35);
      border-radius: 12px; padding: 11px 16px;
      text-align: center; color: var(--red);
      font-size: 15px; font-weight: 700; margin-bottom: 12px;
    }
    .expired-banner.visible { display: block; }

    /* ── End Game Confirmation Popup ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-card {
      background: var(--card); border-radius: 24px;
      padding: 30px 24px 22px; width: 280px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    .confirm-title {
      font-size: 24px; font-weight: 800;
      color: var(--label); margin-bottom: 6px;
    }
    .confirm-subtitle {
      font-size: 14px; color: var(--gray2); margin-bottom: 24px;
      line-height: 1.4;
    }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-yes {
      flex: 1; height: 52px; border-radius: 14px;
      background: var(--red); color: #fff;
      border: none; font-size: 18px; font-weight: 800; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
    }
    .confirm-yes:active { opacity: 0.8; }
    .confirm-no {
      flex: 1; height: 52px; border-radius: 14px;
      background: var(--card2); color: rgba(255,255,255,0.3);
      border: none; font-size: 18px; font-weight: 600; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
    }
    .confirm-no:active { opacity: 0.7; }

    /* ─────────────────────────────────────
       SCREEN 3 — Summary
    ───────────────────────────────────── */
    #screen-summary {
      padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 28px);
      gap: 20px;
    }
    .summary-header { text-align: center; padding-top: 8px; }
    .summary-header .trophy { font-size: 52px; margin-bottom: 8px; }

    .scoreboard { background: var(--card); border-radius: var(--radius); overflow: hidden; }
    .score-row {
      display: flex; align-items: center;
      padding: 15px 18px; gap: 12px;
      border-bottom: 1px solid var(--sep);
    }
    .score-row:last-child { border-bottom: none; }
    .score-row.slowest { background: rgba(255,69,58,0.08); }
    .score-avatar { font-size: 28px; flex-shrink: 0; }
    .score-name   { flex: 1; font-size: 16px; font-weight: 600; color: var(--label); }
    .score-time   { font-size: 17px; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; }
    .score-row.slowest .score-time { color: var(--red); }

    /* Turtle callout */
    .turtle-callout { position: relative; margin-top: -4px; }
    .turtle-arrow {
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 14px solid #FFD60A;
      margin-right: 28px;
    }
    .turtle-bubble {
      background: #FFD60A; border-radius: 18px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 20px rgba(255,214,10,0.3);
    }
    .turtle-emoji {
      font-size: 36px;
      animation: turtle-crawl 1s ease-in-out infinite alternate;
      flex-shrink: 0;
    }
    @keyframes turtle-crawl {
      from { transform: translateX(0) rotate(-4deg); }
      to   { transform: translateX(-8px) rotate(4deg); }
    }
    .turtle-text { font-size: 17px; font-weight: 800; color: #1C1C1E; line-height: 1.3; }
    .turtle-text span { display: block; font-size: 13px; font-weight: 600; color: #5C4A00; margin-top: 3px; }

    .summary-footer { margin-top: auto; display: flex; gap: 10px; }
    .btn-muted { background: var(--card2); color: #fff; height: 58px; flex: 1; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════ SCREEN 1: SETUP ══════════ -->
  <div id="screen-setup" class="screen active">
    <div class="setup-header">
      <h1>لعبة الأناضول</h1>
      <p>من بيلعب؟</p>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="add-player-wrap">
      <button class="btn btn-ghost" id="add-player-btn" onclick="addPlayerRow()">+ أضف لاعب</button>
    </div>
    <div style="margin-top:auto;">
      <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>ابدأ اللعبة</button>
    </div>
  </div>

  <!-- ══════════ SCREEN 2: GAME ══════════ -->
  <div id="screen-game" class="screen">

    <!-- TOP HALF: colored hero -->
    <div class="hero-section" id="hero-section">
      <div class="navbar">
        <!-- RTL: first children = visual RIGHT → pause + mute -->
        <div class="nav-group">
          <button class="icon-btn" id="pause-btn" onclick="togglePause()" aria-label="إيقاف">
            <span id="pause-icon">⏸</span>
          </button>
          <button class="icon-btn" id="mute-btn" onclick="toggleMute()" aria-label="صوت">
            <span id="mute-icon">🔊</span>
          </button>
        </div>
        <!-- RTL: last child = visual LEFT → end game -->
        <button class="icon-btn end-btn" onclick="showEndConfirm()" aria-label="إنهاء اللعبة">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="3" y1="3" x2="13" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="13" y1="3" x2="3" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="hero-content">
        <div class="hero-avatar" id="active-avatar">🍕</div>
        <div class="hero-name" id="active-name">لاعب</div>
      </div>
    </div>

    <!-- BOTTOM HALF: timer sheet -->
    <div class="timer-sheet">
      <div class="timer-center">
        <div id="timer-display">30</div>
        <div class="timer-unit">ثانية</div>
      </div>
      <div class="expired-banner" id="expired-banner">⏰ خلص الوقت</div>
      <button class="btn btn-primary" onclick="nextPlayer()">
        <span>اللي بعده</span>
        <span style="font-size:20px;">←</span>
      </button>
    </div>

  </div>

  <!-- ══════════ END GAME POPUP ══════════ -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-title">أكيد؟</div>
      <div class="confirm-subtitle">اللعبة بتخلص وبتشوف النتايج</div>
      <div class="confirm-btns">
        <button class="confirm-yes" onclick="confirmEndGame()">إيه</button>
        <button class="confirm-no"  onclick="closeConfirm()">لا</button>
      </div>
    </div>
  </div>

  <!-- ══════════ SCREEN 3: SUMMARY ══════════ -->
  <div id="screen-summary" class="screen">
    <div class="summary-header">
      <div class="trophy">🏆</div>
      <h1>خلصت اللعبة</h1>
    </div>
    <div id="scoreboard-wrap"></div>
    <div class="summary-footer">
      <button class="btn btn-muted" onclick="newGame()">لعبة جديدة</button>
      <button class="btn btn-green" style="flex:1;" onclick="playAgain()">العب ثانية</button>
    </div>
  </div>

</div>

<script>
// ════════════════════════
//  CONSTANTS
// ════════════════════════
const AVATARS        = ['👽', '🍕', '🐼', '🥑'];
const PLAYER_COLORS  = ['#1a3a5c', '#5b2d8e', '#1a5c3a', '#7a2020'];
const TIMER_START    = 30;
const CRITICAL_THRESHOLD = 5;
const STORAGE_KEY    = 'rummikub_players';

// ════════════════════════
//  STATE
// ════════════════════════
let players      = [];
let currentIndex = 0;
let secondsLeft  = TIMER_START;
let isPaused     = false;
let isMuted      = false;
let isExpired    = false;
let intervalId   = null;
let turnStart    = null;
let audioCtx     = null;

// ════════════════════════
//  AUDIO
// ════════════════════════
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, gain = 0.3, type = 'sine') {
  if (isMuted) return;
  try {
    const osc = audioCtx.createOscillator();
    const vol = audioCtx.createGain();
    osc.connect(vol); vol.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    vol.gain.setValueAtTime(gain, audioCtx.currentTime);
    vol.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}
function playTick() { playTone(440, 0.04, 0.3); }
function playSchoolBell() {
  if (isMuted) return;
  try {
    const now = audioCtx.currentTime, duration = 2.0;
    const carrier = audioCtx.createOscillator();
    carrier.type = 'square'; carrier.frequency.value = 1050;
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 14;
    const lfoDepth = audioCtx.createGain(); lfoDepth.gain.value = 0.35;
    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0.45, now);
    master.gain.setValueAtTime(0.45, now + 1.6);
    master.gain.exponentialRampToValueAtTime(0.001, now + duration);
    lfo.connect(lfoDepth); lfoDepth.connect(master.gain);
    carrier.connect(master); master.connect(audioCtx.destination);
    carrier.start(now); carrier.stop(now + duration);
    lfo.start(now);    lfo.stop(now + duration);
  } catch(e) {}
}

// ════════════════════════
//  NAVIGATION
// ════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ════════════════════════
//  SCREEN 1 — SETUP
// ════════════════════════
function loadSetup() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const list  = document.getElementById('player-list');
  list.innerHTML = '';
  const count = Math.max(saved.length, 2);
  for (let i = 0; i < count; i++) {
    const s = saved[i] || {};
    // pass null when no saved avatarIndex so appendRow auto-picks unused avatar
    appendRow(s.name || '', s.avatarIndex !== undefined ? s.avatarIndex : null, i);
  }
  validateSetup();
}

function getNextUnusedAvatar() {
  const used = [...document.querySelectorAll('.player-row')]
    .map(r => parseInt(r.dataset.avatarIndex));
  for (let i = 0; i < AVATARS.length; i++) {
    if (!used.includes(i)) return i;
  }
  return 0;
}

function appendRow(name = '', avatarIndex = null, rowIdx = null) {
  const list = document.getElementById('player-list');
  if (list.children.length >= 4) return;
  const idx   = rowIdx !== null ? rowIdx : list.children.length;
  const color = PLAYER_COLORS[idx % PLAYER_COLORS.length];
  const avIdx = avatarIndex !== null ? avatarIndex : getNextUnusedAvatar();
  const row   = document.createElement('div');
  row.className = 'player-row';
  row.dataset.avatarIndex = avIdx;
  row.innerHTML = `
    <button class="remove-btn" onclick="removeRow(this)">×</button>
    <input  class="name-input" type="text" placeholder="اسم اللاعب..."
            value="${escapeHtml(name)}" oninput="onNameInput()" />
    <button class="avatar-btn" onclick="cycleAvatar(this)"
            style="border-color:${color}20; background:${color}30;">${AVATARS[avIdx]}</button>
  `;
  list.appendChild(row);
  updateAddBtn(); validateSetup();
}

function addPlayerRow() { appendRow(); }

function removeRow(btn) {
  const list = document.getElementById('player-list');
  if (list.children.length <= 2) return;
  btn.closest('.player-row').remove();
  updateAddBtn(); validateSetup();
}
function cycleAvatar(btn) {
  const row  = btn.closest('.player-row');
  const used = [...document.querySelectorAll('.player-row')]
    .filter(r => r !== row)
    .map(r => parseInt(r.dataset.avatarIndex));
  let idx = parseInt(row.dataset.avatarIndex);
  for (let tries = 0; tries < AVATARS.length; tries++) {
    idx = (idx + 1) % AVATARS.length;
    if (!used.includes(idx)) break;
  }
  row.dataset.avatarIndex = idx;
  btn.textContent = AVATARS[idx];
  saveSetupToStorage();
}
function onNameInput() { saveSetupToStorage(); validateSetup(); }
function saveSetupToStorage() {
  const rows = [...document.querySelectorAll('.player-row')];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(
    rows.map(r => ({ name: r.querySelector('.name-input').value, avatarIndex: parseInt(r.dataset.avatarIndex) }))
  ));
}
function validateSetup() {
  const names = [...document.querySelectorAll('.name-input')].map(i => i.value.trim());
  document.getElementById('start-btn').disabled = names.filter(Boolean).length < 2;
}
function updateAddBtn() {
  document.getElementById('add-player-btn').style.display =
    document.getElementById('player-list').children.length >= 4 ? 'none' : '';
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════
//  START GAME
// ════════════════════════
function startGame() {
  ensureAudio();
  const rows = [...document.querySelectorAll('.player-row')];
  players = rows
    .filter(r => r.querySelector('.name-input').value.trim())
    .map((r, i) => ({
      name: r.querySelector('.name-input').value.trim(),
      avatarIndex: parseInt(r.dataset.avatarIndex),
      color: PLAYER_COLORS[i % PLAYER_COLORS.length],
      totalPlayTime: 0, turnCount: 0
    }));
  currentIndex = 0; isPaused = false; isMuted = false;
  document.getElementById('pause-icon').textContent = '⏸';
  document.getElementById('mute-icon').textContent  = '🔊';
  showScreen('screen-game');
  renderActivePlayer();
  startTurn();
}

// ════════════════════════
//  SCREEN 2 — GAMEPLAY
// ════════════════════════
function renderActivePlayer() {
  const p = players[currentIndex];
  document.getElementById('active-avatar').textContent        = AVATARS[p.avatarIndex];
  document.getElementById('active-name').textContent          = p.name;
  document.getElementById('hero-section').style.backgroundColor = p.color;
}

function startTurn() {
  secondsLeft = TIMER_START; isExpired = false; turnStart = Date.now();
  document.getElementById('expired-banner').classList.remove('visible');
  document.getElementById('hero-section').classList.remove('critical');
  document.getElementById('timer-display').classList.remove('critical');
  renderTimer();
  clearInterval(intervalId);
  intervalId = setInterval(tick, 1000);
}

function tick() {
  if (isPaused) return;
  secondsLeft--;
  renderTimer();
  if (secondsLeft <= CRITICAL_THRESHOLD && secondsLeft > 0) {
    playTick();
    document.getElementById('hero-section').classList.add('critical');
    document.getElementById('timer-display').classList.add('critical');
  }
  if (secondsLeft <= 0) {
    clearInterval(intervalId);
    document.getElementById('hero-section').classList.remove('critical');
    document.getElementById('hero-section').style.backgroundColor = '#7a1010';
    playSchoolBell();
    isExpired = true;
    document.getElementById('expired-banner').classList.add('visible');
  }
}

function renderTimer() { document.getElementById('timer-display').textContent = secondsLeft; }

function commitTurn() {
  const elapsed = Math.min((Date.now() - turnStart) / 1000, TIMER_START);
  players[currentIndex].totalPlayTime += elapsed;
  players[currentIndex].turnCount     += 1;
}

function nextPlayer() {
  ensureAudio(); clearInterval(intervalId); commitTurn();
  currentIndex = (currentIndex + 1) % players.length;
  renderActivePlayer(); startTurn();
}

function togglePause() {
  if (isExpired) return;
  isPaused = !isPaused;
  document.getElementById('pause-icon').textContent = isPaused ? '▶️' : '⏸';
  if (isPaused) {
    players[currentIndex]._pausedAt = Date.now();
  } else {
    if (players[currentIndex]._pausedAt) {
      turnStart += Date.now() - players[currentIndex]._pausedAt;
      delete players[currentIndex]._pausedAt;
    }
  }
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-icon').textContent = isMuted ? '🔇' : '🔊';
}

// ════════════════════════
//  END GAME POPUP
// ════════════════════════
function showEndConfirm() {
  document.getElementById('confirm-overlay').classList.add('visible');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('visible');
}
function confirmEndGame() {
  closeConfirm();
  clearInterval(intervalId);
  document.getElementById('hero-section').classList.remove('critical');
  if (turnStart && (Date.now() - turnStart) >= 1000) commitTurn();
  showSummary();
}

// ════════════════════════
//  SCREEN 3 — SUMMARY
// ════════════════════════
function showSummary() {
  const sorted = [...players].sort((a, b) => {
    const avgA = a.turnCount ? a.totalPlayTime / a.turnCount : Infinity;
    const avgB = b.turnCount ? b.totalPlayTime / b.turnCount : Infinity;
    return avgA - avgB;
  });
  const slowestIdx = sorted.length - 1;
  const rowsHtml = sorted.map((p, i) => {
    const avg       = p.turnCount ? (p.totalPlayTime / p.turnCount).toFixed(1) + ' ثانية' : '—';
    const isSlowest = i === slowestIdx && p.turnCount > 0;
    return `<div class="score-row${isSlowest ? ' slowest' : ''}">
      <div class="score-avatar">${AVATARS[p.avatarIndex]}</div>
      <div class="score-name">${escapeHtml(p.name)}</div>
      <div class="score-time">${avg}</div>
    </div>`;
  }).join('');

  const slowest    = sorted[slowestIdx];
  const turtleHtml = (slowest && slowest.turnCount > 0) ? `
    <div class="turtle-callout">
      <div class="turtle-arrow"></div>
      <div class="turtle-bubble">
        <div class="turtle-emoji">🐢</div>
        <div class="turtle-text">
          سلامات يا كوكو!
          <span>${escapeHtml(slowest.name)} — أبطأ واحد 🥱</span>
        </div>
      </div>
    </div>` : '';

  document.getElementById('scoreboard-wrap').innerHTML =
    `<div class="scoreboard">${rowsHtml}</div>${turtleHtml}`;
  showScreen('screen-summary');
}

// ════════════════════════
//  NEW GAME / PLAY AGAIN
// ════════════════════════
function newGame() {
  // Fresh start — wipe saved players, show blank setup
  clearInterval(intervalId);
  localStorage.removeItem(STORAGE_KEY);
  showScreen('screen-setup');
  loadSetup();
}

function playAgain() {
  // Same players, reset stats only
  clearInterval(intervalId);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(
    players.map(p => ({ name: p.name, avatarIndex: p.avatarIndex }))
  ));
  showScreen('screen-setup');
  loadSetup();
}

// ════════════════════════
//  INIT
// ════════════════════════
loadSetup();
</script>
</body>
</html>
